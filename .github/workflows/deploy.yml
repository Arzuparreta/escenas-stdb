name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy current main
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          printf -v deploy_path '%q' "$DEPLOY_PATH"

          tar \
            --exclude=.git \
            --exclude=.env \
            --exclude=data \
            -czf - \
            . |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "$port" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail
             mkdir -p $deploy_path
             find $deploy_path -mindepth 1 -maxdepth 1 \
               ! -name .env \
               ! -name data \
               -exec rm -rf -- {} +
             tar -xzf - -C $deploy_path
             cd $deploy_path
             docker compose -f compose.production.yaml up -d --build --remove-orphans --wait --wait-timeout 180
             curl --fail --silent --show-error http://127.0.0.1:18000/health"
